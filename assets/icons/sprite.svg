<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <!-- ===== Theme toggle ===== -->
    <symbol id="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
